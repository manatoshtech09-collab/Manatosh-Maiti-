name: Deploy AutoHire Framework

on:
  push:
    branches: [main]
    paths:
      - 'auto-hire-framework/**'
      - '.github/workflows/deploy-autohire.yml'
  pull_request:
    branches: [main]
    paths:
      - 'auto-hire-framework/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build AutoHire Framework
        run: npm run build:autohire
        env:
          CI: true

      - name: Lint AutoHire Framework
        run: npm run lint:autohire
        env:
          CI: true

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: autohire-build
          path: auto-hire-framework/dist/
          retention-days: 5
